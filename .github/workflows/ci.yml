name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint (Biome)
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Unused code detection (Knip)
        run: bun run knip

      - name: Unused code detection in production mode (Knip)
        run: bun run knip:production

      - name: Security audit
        run: bun audit || true

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - uses: j178/prek-action@v1
